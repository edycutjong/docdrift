<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="DocDrift">
  <defs>
    <linearGradient id="dd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1418"/>
      <stop offset="1" stop-color="#101a2e"/>
    </linearGradient>
    <linearGradient id="dd-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="dd-glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#dd-bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#dd-glow)"/>

  <!-- ground shadow (squishes as the doc hops) -->
  <ellipse cx="246" cy="402" rx="96" ry="15" fill="#000" opacity="0.28">
    <animate attributeName="rx" values="96;70;98;84;96" keyTimes="0;0.35;0.62;0.82;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.28;0.14;0.3;0.22;0.28" keyTimes="0;0.35;0.62;0.82;1" dur="2.4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- bouncing document (squash & stretch around its base) -->
  <g transform="translate(236 336)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1 1;0.94 1.10;1.11 0.90;1.02 0.99;1 1" keyTimes="0;0.35;0.62;0.82;1" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.2 0.6 0.35 1;0.5 0 0.8 0.4;0.2 0.7 0.4 1;0.4 0 0.4 1"/>
      <g transform="translate(-236 -336)">
        <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -32;0 0;0 -9;0 0" keyTimes="0;0.35;0.62;0.82;1" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.2 0.6 0.35 1;0.5 0 0.8 0.4;0.2 0.7 0.4 1;0.4 0 0.4 1"/>

        <path d="M158 146 h118 l58 58 v170 a18 18 0 0 1 -18 18 H158 a18 18 0 0 1 -18 -18 V164 a18 18 0 0 1 18 -18 z" fill="#f8fafc"/>
        <path d="M276 146 l58 58 h-44 a14 14 0 0 1 -14 -14 z" fill="#cbd5e1"/>

        <rect x="178" y="236" width="120" height="11" rx="5.5" fill="#06b6d4" opacity="0.9"/>
        <rect x="178" y="262" width="96" height="11" rx="5.5" fill="#9aa7b8"/>
        <rect x="178" y="288" width="112" height="11" rx="5.5" fill="#9aa7b8"/>

        <circle cx="196" cy="206" r="12" fill="#fb7185" opacity="0.5"/>
        <circle cx="300" cy="206" r="12" fill="#fb7185" opacity="0.5"/>

        <ellipse cx="214" cy="198" rx="11" ry="12" fill="#0f172a">
          <animate attributeName="ry" values="12;12;1.5;12;12" keyTimes="0;0.84;0.89;0.94;1" dur="3.6s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="282" cy="198" rx="11" ry="12" fill="#0f172a">
          <animate attributeName="ry" values="12;12;1.5;12;12" keyTimes="0;0.84;0.89;0.94;1" dur="3.6s" repeatCount="indefinite"/>
        </ellipse>
        <circle cx="217.5" cy="194" r="3.6" fill="#fff"/>
        <circle cx="285.5" cy="194" r="3.6" fill="#fff"/>

        <!-- smile gives a little 'whee' on the hop -->
        <path d="M226 214 q22 17 44 0" fill="none" stroke="#0f172a" stroke-width="5.5" stroke-linecap="round">
          <animate attributeName="d" values="M226 214 q22 17 44 0;M226 212 q22 23 44 0;M226 214 q22 17 44 0" keyTimes="0;0.35;1" dur="2.4s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>
  </g>

  <!-- scanning magnifier (orbits + lens glint) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="9s" repeatCount="indefinite"/>
    <g transform="translate(372 150)">
      <circle r="35" fill="#06b6d4" opacity="0.14"/>
      <circle r="35" fill="none" stroke="url(#dd-ring)" stroke-width="11"/>
      <rect x="24" y="24" width="44" height="14" rx="7" transform="rotate(45 24 24)" fill="url(#dd-ring)"/>
      <circle cx="-10" cy="-12" r="7" fill="#fff" opacity="0.85">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="1.3s" repeatCount="indefinite"/>
        <animate attributeName="r" values="6;8;6" dur="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- sparkles -->
  <path d="M120 360 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5z" fill="#8b5cf6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></path>
  <path d="M404 350 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4z" fill="#22d3ee"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" begin="0.8s" repeatCount="indefinite"/></path>
  <path d="M150 110 l3.5 9 9 3.5 -9 3.5 -3.5 9 -3.5 -9 -9 -3.5 9 -3.5z" fill="#22d3ee"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" begin="1.5s" repeatCount="indefinite"/></path>
</svg>
